name: Build & Test Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 4 AM UTC (staggered from other nightly workflows)
    - cron: '0 4 * * *'

jobs:
  test-suite:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    env:
      QT_QPA_PLATFORM: offscreen
      LIBGL_ALWAYS_SOFTWARE: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libopengl0 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xkb1 \
            libxrender1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "Platforms/Python[dev]"
          pip install pytest-html
        working-directory: ${{ github.workspace }}
      
      - name: Run full test suite
        shell: bash
        run: |
          cd Platforms/Python
          python -m pytest time_warp/tests/ -v \
            --cov=time_warp \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=long
        working-directory: ${{ github.workspace }}
      
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: ./Platforms/Python/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "Platforms/Python[dev]"
          pip install black isort flake8 mypy
      
      - name: Check code formatting (black)
        run: |
          cd Platforms/Python
          black --check time_warp/ --diff || true
        working-directory: ${{ github.workspace }}
      
      - name: Check import sorting (isort)
        run: |
          cd Platforms/Python
          isort --check-only time_warp/ --diff || true
        working-directory: ${{ github.workspace }}
      
      - name: Lint with flake8
        run: |
          cd Platforms/Python
          flake8 time_warp/ --count --statistics --max-line-length=120 || true
        working-directory: ${{ github.workspace }}
      
      - name: Type check with mypy
        run: |
          cd Platforms/Python
          mypy time_warp/ --ignore-missing-imports --pretty || true
        working-directory: ${{ github.workspace }}

  test-report:
    runs-on: ubuntu-latest
    needs: test-suite
    if: always()

    env:
      QT_QPA_PLATFORM: offscreen
      LIBGL_ALWAYS_SOFTWARE: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libxkbcommon0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          pip install -e "Platforms/Python[dev]"
          pip install pytest-html
      
      - name: Generate test report
        if: always()
        run: |
          cd Platforms/Python
          python -m pytest time_warp/tests/ -v --tb=short \
            --html=test_report.html || true
        working-directory: ${{ github.workspace }}
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: Platforms/Python/test_report.html
          retention-days: 30
      
      - name: Generate summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cd Platforms/Python
          python -m pytest time_warp/tests/ --tb=no -q --no-header --color=no >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Test report available in artifacts" >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ github.workspace }}

  build-validation:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install and build
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e "Platforms/Python[dev]"
      
      - name: Validate package
        run: |
          cd Platforms/Python
          python -c "
          from time_warp.core.interpreter import Language
          langs = [l.name for l in Language]
          print(f'✅ Package imports successfully, {len(langs)} languages: {langs}')
          "
