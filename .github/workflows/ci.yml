name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: Platforms/Python
    env:
      QT_QPA_PLATFORM: offscreen
      LIBGL_ALWAYS_SOFTWARE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('Platforms/Python/pyproject.toml', 'Platforms/Python/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
      - name: Install system dependencies (Qt libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libdbus-1-3 libfontconfig1 libglib2.0-0 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xkb1 libxcb-cursor0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff
      - name: Lint (ruff — critical errors)
        run: |
          ruff check --select=E9,F63,F7,F82 --output-format=github .
      - name: Lint (ruff — full suite)
        run: |
          ruff check --output-format=github . || true
      - name: Run unit tests with coverage
        run: |
          pytest -q --tb=short \
            --cov=time_warp \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            time_warp/tests/
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Platforms/Python/coverage.xml

  demo-validation:
    name: Demo programs validation
    runs-on: ubuntu-latest
    needs: test
    env:
      QT_QPA_PLATFORM: offscreen
      LIBGL_ALWAYS_SOFTWARE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-demos-${{ hashFiles('Platforms/Python/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install system dependencies (Qt libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libdbus-1-3 libfontconfig1 libglib2.0-0 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xkb1 libxcb-cursor0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Platforms/Python/requirements.txt
          pip install -e Platforms/Python
      - name: Validate all demo programs
        run: python test_all_demos.py
