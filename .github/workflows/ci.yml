name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: platforms/go/go.sum
      - name: Build Go binaries
        working-directory: platforms/go
        run: |
          go build ./cmd/timewarp
          go build ./cmd/timewarp-gui
      - name: Test Go packages
        working-directory: platforms/go
        run: |
          go vet ./...
          go test ./...
      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries-ubuntu
          path: |
            platforms/go/timewarp
            platforms/go/timewarp-gui

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev requirements
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      - name: Run pytest (Time_Warp_Python)
        run: |
          if [ -d Time_Warp_Python ]; then \
            cd Time_Warp_Python && pytest -v --tb=short; \
          else \
            echo "Time_Warp_Python not present"; \
          fi

  rust:
    name: Rust build and tests (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            platforms/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('platforms/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build Rust project if present
        run: |
          if [ -d platforms/rust ] && [ -f platforms/rust/Cargo.toml ]; then \
            cd platforms/rust && cargo build --verbose && cargo test --verbose; \
          else \
            echo "platforms/rust not present or missing Cargo.toml"; \
          fi
