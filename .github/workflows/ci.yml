name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: platforms/go/go.sum
      - name: Build Go binaries
        working-directory: platforms/go
        run: |
          go build ./cmd/timewarp
          go build ./cmd/timewarp-gui
      - name: Test Go packages
        working-directory: platforms/go
        run: |
          go vet ./...
          go test ./...
      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries-ubuntu
          path: |
            platforms/go/timewarp
            platforms/go/timewarp-gui

  python:
    name: Python tests (platforms/python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies (GUI/Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,dev]"
          pip install ruff
      - name: Lint critical (ruff)
        run: |
          ruff check --select=E9,F63,F7,F82 --output-format=github .
      - name: Run tests (smoke)
        run: |
          xvfb-run -a pytest -q

  rust:
    name: Rust build and tests (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            platforms/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('platforms/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build Rust project if present
        run: |
          if [ -d platforms/rust ] && [ -f platforms/rust/Cargo.toml ]; then \
            cd platforms/rust && cargo build --verbose && cargo test --verbose; \
          else \
            echo "platforms/rust not present or missing Cargo.toml"; \
          fi
