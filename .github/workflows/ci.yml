name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tests (Platforms/Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Platforms/Python
    env:
      QT_QPA_PLATFORM: offscreen
      LIBGL_ALWAYS_SOFTWARE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Platforms/Python/pyproject.toml', 'Platforms/Python/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install system dependencies (Qt libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libdbus-1-3 libfontconfig1 libglib2.0-0 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xkb1 libxcb-cursor0
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff
      - name: Lint critical (ruff)
        run: |
          ruff check --select=E9,F63,F7,F82 --output-format=github .
      - name: Run tests (smoke)
        run: |
          pytest -q --tb=short --no-cov
