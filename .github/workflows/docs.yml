name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List Markdown docs
        run: |
          echo "Listing documentation files (Markdown)"
          find docs -type f -name "*.md" | sort
      - name: Basic docs validation
        run: |
          echo "Checking for missing required sections..."
          test -f docs/INDEX.md
          test -d docs/user
          test -d docs/teacher
          test -d docs/student
          test -d docs/developer
          echo "Docs structure looks good."
