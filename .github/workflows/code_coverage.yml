name: Code Coverage

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      LIBGL_ALWAYS_SOFTWARE: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Qt libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libdbus-1-3 libfontconfig1 libglib2.0-0 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xkb1 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "Platforms/Python[dev]"
          pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: Platforms/Python
        run: |
          pytest time_warp/tests/ --cov=time_warp --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: Platforms/Python/coverage.xml
          flags: unittests
          name: code-coverage-report